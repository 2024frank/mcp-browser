<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oberlin Calendar Automation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #f1f5f9;
      --card:            #ffffff;
      --border:          #e2e8f0;
      --primary:         #1d4ed8;
      --primary-dark:    #1e40af;
      --success:         #15803d;
      --success-bg:      #f0fdf4;
      --success-border:  #bbf7d0;
      --warning:         #b45309;
      --warning-bg:      #fffbeb;
      --warning-border:  #fde68a;
      --danger:          #b91c1c;
      --danger-bg:       #fef2f2;
      --danger-border:   #fecaca;
      --info-bg:         #eff6ff;
      --info-border:     #bfdbfe;
      --text:            #0f172a;
      --muted:           #64748b;
      --radius:          8px;
      --shadow:          0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Topbar ───────────────────────────────────────────── */
    .topbar {
      background: #0f172a;
      color: #f8fafc;
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 1px 0 rgba(255,255,255,.06);
    }
    .topbar-left  { display: flex; align-items: center; gap: 14px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .brand { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600;
    }
    .status-pill::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
    }
    .status-online  { background: rgba(22,163,74,.25); color: #86efac; }
    .status-online::before  { background: #4ade80; animation: blink 2s infinite; }
    .status-offline { background: rgba(220,38,38,.25); color: #fca5a5; }
    .status-offline::before { background: #f87171; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }

    .ts { font-size: 12px; color: #64748b; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: var(--radius); border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      text-decoration: none; transition: opacity .15s, background .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .45; pointer-events: none; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; }

    .btn-ghost    { background: rgba(255,255,255,.08); color: #f8fafc; }
    .btn-ghost:hover { background: rgba(255,255,255,.15); }
    .btn-outline  { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--bg); }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success  { background: var(--success); color: #fff; }
    .btn-success:hover { background: #166534; }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #991b1b; }
    .btn-muted    { background: #f1f5f9; border: 1px solid var(--border); color: var(--muted); }
    .btn-muted:hover { background: var(--border); }

    /* ── Stats row ────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 20px 24px 4px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      box-shadow: var(--shadow);
    }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
    .stat-num   { font-size: 30px; font-weight: 800; color: var(--text); margin: 4px 0 2px; line-height: 1; }
    .stat-sub   { font-size: 11px; color: var(--muted); }

    /* ── Two-column layout ────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 270px 1fr;
      gap: 16px;
      padding: 16px 24px 40px;
    }

    /* ── Panel ────────────────────────────────────────────── */
    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel + .panel { margin-top: 14px; }

    .panel-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-head h3 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .6px; color: var(--muted);
    }

    /* ── Sources sidebar ──────────────────────────────────── */
    .source-row {
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .source-row:last-child { border-bottom: none; }
    .source-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok   { background: #4ade80; }
    .dot-err  { background: #f87171; }
    .dot-idle { background: #94a3b8; }
    .source-info { flex: 1; min-width: 0; }
    .source-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Runs log ─────────────────────────────────────────── */
    .run-row {
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted);
    }
    .run-row:last-child { border-bottom: none; }
    .run-ok  { color: var(--success); font-weight: 700; }
    .run-err { color: var(--danger);  font-weight: 700; }

    /* ── Filter tabs ──────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--muted);
      transition: all .15s;
    }
    .tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .tab:hover:not(.active) { background: var(--bg); }

    .queue-count { font-size: 12px; color: var(--muted); font-weight: 600; }

    /* ── Event card ───────────────────────────────────────── */
    .event-card { border-bottom: 1px solid var(--border); }
    .event-card:last-child { border-bottom: none; }

    .card-head {
      padding: 13px 16px;
      display: flex; align-items: flex-start; gap: 10px;
      cursor: pointer;
      transition: background .12s;
    }
    .card-head:hover { background: #fafafa; }
    .event-card.open .card-head { background: #f8faff; }

    .chevron {
      width: 15px; height: 15px; flex-shrink: 0; margin-top: 2px;
      color: var(--muted); transition: transform .2s;
    }
    .event-card.open .chevron { transform: rotate(180deg); }

    .card-title { font-size: 14px; font-weight: 600; flex: 1; }
    .card-meta  { font-size: 12px; color: var(--muted); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 5px; }
    .meta-sep   { color: #cbd5e1; }

    .badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; margin-left: 6px; }

    /* ── Badges ───────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 100px;
      font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid transparent;
    }
    .b-hyperlocal { background:#dbeafe; color:#1e40af; border-color:#bfdbfe; }
    .b-city       { background:#d1fae5; color:#065f46; border-color:#a7f3d0; }
    .b-lorain     { background:#ede9fe; color:#5b21b6; border-color:#ddd6fe; }
    .b-neohio     { background:#fce7f3; color:#9d174d; border-color:#fbcfe8; }
    .b-online     { background:#e0f2fe; color:#075985; border-color:#bae6fd; }
    .b-state      { background:#f1f5f9; color:#475569; border-color:#e2e8f0; }
    .b-national   { background:#f1f5f9; color:#475569; border-color:#e2e8f0; }
    .b-unknown    { background:#f1f5f9; color:#94a3b8; border-color:#e2e8f0; }

    .b-pending  { background:var(--warning-bg);  color:var(--warning);  border-color:var(--warning-border); }
    .b-approved { background:var(--success-bg);  color:var(--success);  border-color:var(--success-border); }
    .b-rejected { background:var(--danger-bg);   color:var(--danger);   border-color:var(--danger-border); }
    .b-dup      { background:#fef3c7; color:#92400e; border-color:#fde68a; }

    /* ── Expanded body ────────────────────────────────────── */
    .card-body {
      display: none;
      padding: 20px 18px;
      background: #fafafa;
      border-top: 1px solid var(--border);
    }
    .event-card.open .card-body { display: block; }

    /* ── Field sections ───────────────────────────────────── */
    .fsection { margin-bottom: 22px; }
    .fsection-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
    }
    .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .fcol2 { grid-column: 1 / -1; }

    .fitem { display: flex; flex-direction: column; gap: 3px; }
    .flabel {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .3px; color: var(--muted);
    }
    .fvalue-wrap { position: relative; }
    .fvalue {
      background: #fff; border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 32px 7px 10px; min-height: 34px;
      font-size: 13px; word-break: break-word;
    }
    .fvalue.empty { color: var(--muted); font-style: italic; }
    .fvalue.tall  { min-height: 80px; white-space: pre-wrap; }

    .copy-btn {
      position: absolute; right: 6px; top: 7px;
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: var(--muted); padding: 2px 3px; border-radius: 4px;
      line-height: 1; transition: color .12s, background .12s;
    }
    .copy-btn:hover { color: var(--primary); background: var(--info-bg); }
    .fvalue.tall ~ .copy-btn { top: 7px; }

    .ftags {
      background: #fff; border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; min-height: 34px;
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
    }
    .ftag {
      padding: 2px 8px; background: var(--info-bg); border: 1px solid var(--info-border);
      color: var(--primary); border-radius: 100px; font-size: 11px; font-weight: 500;
    }

    /* ── Duplicate notice ─────────────────────────────────── */
    .dup-notice {
      background: var(--warning-bg); border: 1px solid var(--warning-border);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: var(--warning); margin-bottom: 18px;
      display: flex; gap: 8px; align-items: flex-start;
    }
    .dup-notice a { color: inherit; text-decoration: underline; }

    /* ── Action bar ───────────────────────────────────────── */
    .action-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding-top: 16px; margin-top: 6px; border-top: 1px solid var(--border);
    }
    .action-bar-space { flex: 1; }

    /* Community Hub submit button gets special treatment */
    .btn-hub {
      background: #0f172a; color: #fff; font-size: 13px;
      padding: 8px 16px; border-radius: var(--radius); font-weight: 600;
    }
    .btn-hub:hover { background: #1e293b; }

    /* ── Empty / loading states ───────────────────────────── */
    .empty {
      padding: 48px 24px; text-align: center; color: var(--muted);
    }
    .empty-icon  { font-size: 38px; margin-bottom: 10px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-desc  { font-size: 13px; }

    .spin {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .65s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toasts ───────────────────────────────────────────── */
    #toasts {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 6px; z-index: 9999;
    }
    .toast {
      padding: 10px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
      animation: slideUp .2s ease;
    }
    .toast-ok  { background: #15803d; color:#fff; }
    .toast-err { background: #b91c1c; color:#fff; }
    .toast-inf { background: #1d4ed8; color:#fff; }
    @keyframes slideUp { from { transform:translateY(12px); opacity:0; } }

    @media (max-width: 880px) {
      .layout      { grid-template-columns: 1fr; }
      .stats-row   { grid-template-columns: repeat(2,1fr); }
      .fgrid       { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══ TOPBAR ═══════════════════════════════════════════════════════════════ -->
<header class="topbar">
  <div class="topbar-left">
    <span style="font-size:18px">📅</span>
    <span class="brand">Oberlin Calendar Automation</span>
    <span class="status-pill status-offline" id="statusPill">Connecting…</span>
  </div>
  <div class="topbar-right">
    <span class="ts" id="tsLabel"></span>
    <button class="btn btn-ghost btn-sm" onclick="doRefresh()">Refresh</button>
    <button class="btn btn-ghost btn-sm" onclick="syncHub()" id="syncBtn">Sync Hub</button>
    <button class="btn btn-primary btn-sm" onclick="runAll()" id="runBtn">▶ Run Now</button>
  </div>
</header>

<!-- ═══ STATS ════════════════════════════════════════════════════════════════ -->
<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="stat-label">Sources</div><div class="spin" style="margin-top:10px"></div></div>
  <div class="stat-card"><div class="stat-label">Discovered</div><div class="spin" style="margin-top:10px"></div></div>
  <div class="stat-card"><div class="stat-label">Pending Review</div><div class="spin" style="margin-top:10px"></div></div>
  <div class="stat-card"><div class="stat-label">Hub Memory</div><div class="spin" style="margin-top:10px"></div></div>
</div>

<!-- ═══ MAIN LAYOUT ══════════════════════════════════════════════════════════ -->
<div class="layout">

  <!-- Left sidebar -->
  <aside>
    <div class="panel">
      <div class="panel-head">
        <h3>Sources</h3>
        <button class="btn btn-outline btn-xs" onclick="runAll()">▶ Run All</button>
      </div>
      <div id="sourcesList"><div style="padding:18px;color:var(--muted)"><div class="spin"></div></div></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h3>Recent Runs</h3></div>
      <div id="runsList"><div style="padding:18px;color:var(--muted)"><div class="spin"></div></div></div>
    </div>
  </aside>

  <!-- Review queue -->
  <main>
    <div class="panel">
      <div class="panel-head">
        <div style="display:flex;align-items:center;gap:10px">
          <h3>Review Queue</h3>
          <span class="queue-count" id="queueCount"></span>
        </div>
        <div class="tabs">
          <button class="tab active" data-f="pending"    onclick="setFilter('pending')">Pending</button>
          <button class="tab"        data-f="duplicate"  onclick="setFilter('duplicate')">Duplicates</button>
          <button class="tab"        data-f="approved"   onclick="setFilter('approved')">Submitted</button>
          <button class="tab"        data-f="rejected"   onclick="setFilter('rejected')">Rejected</button>
          <button class="tab"        data-f="all"        onclick="setFilter('all')">All</button>
        </div>
      </div>
      <div id="reviewQueue">
        <div class="empty"><div class="spin" style="margin:0 auto 10px"></div>Loading…</div>
      </div>
    </div>
  </main>

</div><!-- /layout -->

<div id="toasts"></div>

<!-- ═══ JAVASCRIPT ═══════════════════════════════════════════════════════════ -->
<script>
const HUB_FORM = "https://environmentaldashboard.org/calendar/post/new?show-menu-bar=1";

let filter    = "pending";
let allEvents = [];
let openCards = new Set();

/* ── API ─────────────────────────────────────────────────────────────────── */
async function apiFetch(path, opts = {}) {
  const r = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(j.error || r.statusText);
  return j;
}

/* ── Load all data ───────────────────────────────────────────────────────── */
async function loadAll() {
  try {
    const [health, stagingRes, sourcesRes, runsRes] = await Promise.all([
      apiFetch("/health"),
      apiFetch("/api/events-staging?limit=200"),
      apiFetch("/api/sources"),
      apiFetch("/api/source-runs?limit=12")
    ]);

    setOnline(true);
    renderStats(health, stagingRes);
    renderSources(sourcesRes.sources || []);
    renderRuns(runsRes.runs || []);
    allEvents = stagingRes.events_staging || [];
    renderQueue();
    document.getElementById("tsLabel").textContent =
      "Updated " + new Date().toLocaleTimeString();
  } catch (e) {
    setOnline(false);
    console.error(e);
  }
}

/* ── Status pill ─────────────────────────────────────────────────────────── */
function setOnline(yes) {
  const el = document.getElementById("statusPill");
  el.className = "status-pill " + (yes ? "status-online" : "status-offline");
  el.textContent = yes ? "Service Running" : "Offline";
}

/* ── Stats ───────────────────────────────────────────────────────────────── */
function renderStats(health, stagingRes) {
  const pending = (stagingRes.events_staging || [])
    .filter(e => e.review_status === "pending" && !e.is_duplicate).length;
  const c = health.counts || {};
  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Sources</div>
      <div class="stat-num">${c.sources ?? "—"}</div>
      <div class="stat-sub">active sources</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Candidates Found</div>
      <div class="stat-num">${c.event_candidates ?? "—"}</div>
      <div class="stat-sub">event links discovered</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending Review</div>
      <div class="stat-num" style="color:${pending > 0 ? "var(--warning)" : "var(--success)"}">${pending}</div>
      <div class="stat-sub">of ${c.events_staging ?? 0} staged total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hub Memory</div>
      <div class="stat-num">${c.community_hub_events ?? "—"}</div>
      <div class="stat-sub">events cached for dedup</div>
    </div>`;
}

/* ── Sources list ────────────────────────────────────────────────────────── */
function renderSources(sources) {
  if (!sources.length) {
    document.getElementById("sourcesList").innerHTML =
      '<div style="padding:16px;font-size:12px;color:var(--muted)">No sources configured.</div>';
    return;
  }
  document.getElementById("sourcesList").innerHTML = sources.map(s => {
    const dotCls = s.last_run_status === "success" ? "dot-ok"
                 : s.last_run_status === "failed"  ? "dot-err"
                 : "dot-idle";
    return `
      <div class="source-row">
        <div class="source-dot ${dotCls}"></div>
        <div class="source-info">
          <div class="source-name" title="${esc(s.source_name)}">${esc(s.source_name)}</div>
          <div class="source-sub">${s.last_polled_at ? ago(s.last_polled_at) : "never run"}
            ${s.adapter_key ? " · " + s.adapter_key.replace(/_v\d$/, "") : ""}</div>
        </div>
        <button class="btn btn-outline btn-xs" onclick="runSource('${s.id}')">▶</button>
      </div>`;
  }).join("");
}

/* ── Runs log ────────────────────────────────────────────────────────────── */
function renderRuns(runs) {
  if (!runs.length) {
    document.getElementById("runsList").innerHTML =
      '<div style="padding:14px 16px;font-size:12px;color:var(--muted)">No runs yet.</div>';
    return;
  }
  document.getElementById("runsList").innerHTML = runs.slice(0, 10).map(r => {
    const ok = r.status === "success";
    return `<div class="run-row">
      <span class="${ok ? "run-ok" : "run-err"}">${ok ? "✓" : "✗"}</span>
      <span style="flex:1">${ago(r.started_at)}</span>
      <span>${r.upserted_events ?? 0} evt${(r.upserted_events ?? 0) === 1 ? "" : "s"}</span>
    </div>`;
  }).join("");
}

/* ── Queue ───────────────────────────────────────────────────────────────── */
function setFilter(f) {
  filter = f;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.f === f));
  renderQueue();
}

function filteredEvents() {
  switch (filter) {
    case "pending":   return allEvents.filter(e => e.review_status === "pending" && !e.is_duplicate);
    case "duplicate": return allEvents.filter(e => e.is_duplicate);
    case "approved":  return allEvents.filter(e => e.review_status === "approved");
    case "rejected":  return allEvents.filter(e => e.review_status === "rejected");
    default:          return allEvents;
  }
}

function renderQueue() {
  const evts = filteredEvents();
  document.getElementById("queueCount").textContent = evts.length + " event" + (evts.length === 1 ? "" : "s");

  if (!evts.length) {
    document.getElementById("reviewQueue").innerHTML = `
      <div class="empty">
        <div class="empty-icon">${filter === "pending" ? "✅" : "📭"}</div>
        <div class="empty-title">${filter === "pending" ? "Queue is clear!" : "Nothing here"}</div>
        <div class="empty-desc">${filter === "pending"
          ? "No events pending review. Click <strong>▶ Run Now</strong> to discover new events."
          : "No events match this filter."}</div>
      </div>`;
    return;
  }

  document.getElementById("reviewQueue").innerHTML = evts.map(ev => buildCard(ev)).join("");
  // Restore open state
  openCards.forEach(id => {
    const el = document.getElementById("c-" + id);
    if (el) el.classList.add("open");
  });
}

function toggleCard(id) {
  const el = document.getElementById("c-" + id);
  if (!el) return;
  el.classList.toggle("open");
  openCards[el.classList.contains("open") ? "add" : "delete"](id);
}

/* ── Build one event card ─────────────────────────────────────────────────── */
function buildCard(ev) {
  const p     = ev.community_hub_payload || {};
  const isDup = !!ev.is_duplicate;

  const scopeCls = { hyperlocal:"b-hyperlocal", city:"b-city", lorain_county:"b-lorain",
    northeast_ohio:"b-neohio", state:"b-state", national:"b-national",
    online:"b-online" }[ev.hyperlocal_scope] ?? "b-unknown";
  const scopeTxt = { hyperlocal:"Hyperlocal", city:"Oberlin Area", lorain_county:"Lorain Co.",
    northeast_ohio:"NE Ohio", state:"Ohio", national:"National",
    online:"Online", unknown:"?" }[ev.hyperlocal_scope] ?? "?";

  const statusCls = isDup ? "b-dup"
    : ev.review_status === "approved" ? "b-approved"
    : ev.review_status === "rejected" ? "b-rejected"
    : "b-pending";
  const statusTxt = isDup ? "Duplicate"
    : ev.review_status === "approved" ? "Submitted"
    : ev.review_status === "rejected" ? "Rejected"
    : "Pending";

  const dateLine = fmtDate(ev.start_datetime);
  const loc      = ev.location_or_address || "";

  return `
<div class="event-card" id="c-${ev.id}">
  <div class="card-head" onclick="toggleCard('${ev.id}')">
    <svg class="chevron" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
    </svg>
    <div style="flex:1;min-width:0">
      <div class="card-title">${esc(ev.title || "Untitled")}</div>
      <div class="card-meta">
        ${dateLine ? `<span>${esc(dateLine)}</span>` : ""}
        ${dateLine && loc ? '<span class="meta-sep">·</span>' : ""}
        ${loc ? `<span>${esc(loc)}</span>` : ""}
        ${ev.source_name ? `<span class="meta-sep">·</span><span>${esc(ev.source_name)}</span>` : ""}
      </div>
    </div>
    <div class="badges">
      ${ev.hyperlocal_scope ? `<span class="badge ${scopeCls}">${scopeTxt}</span>` : ""}
      <span class="badge ${statusCls}">${statusTxt}</span>
    </div>
  </div>

  <div class="card-body">
    ${buildBody(ev, p, isDup)}
  </div>
</div>`;
}

/* ── Build expanded body ─────────────────────────────────────────────────── */
function buildBody(ev, p, isDup) {
  const geo = ev.geographic_tags || [];
  const cats = p.event_type_categories || ev.event_type_categories || [];

  return `
    ${isDup ? `<div class="dup-notice">⚠️
      <div><strong>Duplicate detected</strong> — this event already exists in the Community Hub or staging queue.<br>
      <small>${esc(ev.duplicate_reason || "")}
        ${ev.duplicate_match_url ? `— <a href="${esc(ev.duplicate_match_url)}" target="_blank">${esc(ev.duplicate_match_url)}</a>` : ""}</small>
      </div></div>` : ""}

    <!-- 1. Core event info -->
    <div class="fsection">
      <div class="fsection-title">Core Event Information</div>
      <div class="fgrid">
        ${f("Title",           p.title || ev.title,             true)}
        ${f("Post Type",       p.post_type || "Event")}
        ${f("Start Date/Time", fmtLong(ev.start_datetime))}
        ${f("End Date/Time",   fmtLong(ev.end_datetime))}
        ${f("Location Type",   p.location_type || ev.location_type)}
        ${f("Location / Address", p.location_or_address || ev.location_or_address)}
        ${f("Room Number",     p.room_number)}
        ${f("Online Meeting Link", p.event_link)}
      </div>
    </div>

    <!-- 2. Organizer & contact -->
    <div class="fsection">
      <div class="fsection-title">Organizational Sponsor &amp; Contact</div>
      <div class="fgrid">
        ${f("Organizational Sponsor", p.organizational_sponsor || ev.organizational_sponsor, true)}
        ${f("Contact Email",    p.contact_email)}
        ${f("Contact Phone",    p.contact_phone)}
        ${f("Organization Website", p.organization_website)}
        ${f("Submitter Email",  "(enter your email when submitting)")}
      </div>
    </div>

    <!-- 3. Descriptions -->
    <div class="fsection">
      <div class="fsection-title">Descriptions</div>
      <div class="fgrid">
        ${ftall("Short Description — for Digital Signs (~200 chars max)",
          p.short_description_for_digital_signs || ev.short_description)}
        ${ftall("Extended Description — for Web &amp; Newsletter",
          p.extended_description_for_web_and_newsletter || ev.extended_description)}
      </div>
    </div>

    <!-- 4. Categories & display -->
    <div class="fsection">
      <div class="fsection-title">Categories &amp; Display Settings</div>
      <div class="fgrid">
        <div class="fitem fcol2">
          <span class="flabel">Event Type Categories</span>
          <div class="ftags">${cats.length
            ? cats.map(t => `<span class="ftag">${esc(t)}</span>`).join("")
            : '<span style="color:var(--muted);font-size:12px">None</span>'}</div>
        </div>
        ${f("Display Target",  p.display_target || "All Public Screens")}
        ${f("Artwork / Image URL", p.artwork_upload_or_gallery || ev.artwork_url)}
      </div>
    </div>

    <!-- 5. Geographic scope -->
    <div class="fsection">
      <div class="fsection-title">Geographic Scope (auto-tagged)</div>
      <div class="fgrid">
        ${f("Scope", ev.hyperlocal_scope || "unknown")}
        <div class="fitem">
          <span class="flabel">Geographic Tags</span>
          <div class="ftags">${geo.length
            ? geo.map(t => `<span class="ftag">${esc(t)}</span>`).join("")
            : '<span style="color:var(--muted);font-size:12px">None</span>'}</div>
        </div>
      </div>
    </div>

    <!-- 6. Source attribution -->
    <div class="fsection">
      <div class="fsection-title">Source Attribution</div>
      <div class="fgrid">
        ${f("Source Name",      p.source_name || ev.source_name)}
        ${f("Source Event URL", ev.source_event_url)}
      </div>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <a class="btn btn-hub" href="${HUB_FORM}" target="_blank" rel="noopener noreferrer">
        Open Community Hub Form ↗
      </a>
      <div class="action-bar-space"></div>
      ${!isDup && ev.review_status !== "approved" ? `
        <button class="btn btn-success btn-sm"
          onclick="setStatus('${ev.id}','approved');event.stopPropagation()">
          ✓ Mark Submitted
        </button>` : ""}
      ${ev.review_status !== "rejected" ? `
        <button class="btn btn-danger btn-sm"
          onclick="setStatus('${ev.id}','rejected');event.stopPropagation()">
          ✕ Reject
        </button>` : `
        <button class="btn btn-muted btn-sm"
          onclick="setStatus('${ev.id}','pending');event.stopPropagation()">
          ↩ Restore
        </button>`}
    </div>`;
}

/* ── Field renderers ─────────────────────────────────────────────────────── */
function f(label, value, fullWidth = false) {
  const empty = !value;
  const v = empty ? "—" : String(value);
  return `
    <div class="fitem${fullWidth ? " fcol2" : ""}">
      <span class="flabel">${label}</span>
      <div class="fvalue-wrap">
        <div class="fvalue${empty ? " empty" : ""}">${esc(v)}</div>
        ${!empty ? `<button class="copy-btn" onclick="cp(${JSON.stringify(v)})" title="Copy">⎘</button>` : ""}
      </div>
    </div>`;
}

function ftall(label, value) {
  const empty = !value;
  const v = empty ? "—" : String(value);
  return `
    <div class="fitem fcol2">
      <span class="flabel">${label}</span>
      <div class="fvalue-wrap">
        <div class="fvalue tall${empty ? " empty" : ""}">${esc(v)}</div>
        ${!empty ? `<button class="copy-btn" onclick="cp(${JSON.stringify(v)})" title="Copy">⎘</button>` : ""}
      </div>
    </div>`;
}

/* ── Actions ─────────────────────────────────────────────────────────────── */
async function setStatus(id, status) {
  try {
    await apiFetch("/api/events-staging/" + id, {
      method: "PATCH", body: { review_status: status }
    });
    const ev = allEvents.find(e => e.id === id);
    if (ev) ev.review_status = status;
    renderQueue();
    toast(status === "approved" ? "Marked as submitted ✓"
        : status === "rejected" ? "Event rejected"
        : "Restored to pending", status === "approved" ? "ok" : status === "rejected" ? "err" : "inf");
  } catch (e) {
    toast("Error: " + e.message, "err");
  }
}

async function runSource(id) {
  toast("Running source…", "inf");
  setBusy(true);
  try {
    const r = await apiFetch("/api/sources/" + id + "/run", { method: "POST" });
    toast("Done — " + (r.upserted_events || 0) + " events staged", "ok");
    await loadAll();
  } catch (e) { toast("Failed: " + e.message, "err"); }
  finally { setBusy(false); }
}

async function runAll() {
  toast("Running all due sources…", "inf");
  setBusy(true);
  try {
    const r = await apiFetch("/api/runs/discover-due-sources", { method: "POST" });
    const total = (r.results || []).reduce((s, x) => s + (x.upserted_events || 0), 0);
    toast("Run complete — " + total + " events staged", "ok");
    await loadAll();
  } catch (e) { toast("Run failed: " + e.message, "err"); }
  finally { setBusy(false); }
}

async function syncHub() {
  toast("Syncing hub memory…", "inf");
  setBusy(true);
  try {
    const r = await apiFetch("/api/community-hub-events/sync-browser", { method: "POST" });
    toast("Hub sync done — " + r.parsed_count + " events cached", "ok");
    await loadAll();
  } catch (e) { toast("Sync failed: " + e.message, "err"); }
  finally { setBusy(false); }
}

async function doRefresh() { await loadAll(); }

/* ── Utilities ───────────────────────────────────────────────────────────── */
function setBusy(b) {
  document.getElementById("runBtn").disabled  = b;
  document.getElementById("syncBtn").disabled = b;
}

function cp(text) {
  navigator.clipboard.writeText(text).then(
    () => toast("Copied!", "ok"),
    () => {
      const t = document.createElement("textarea");
      t.value = text; document.body.appendChild(t); t.select();
      document.execCommand("copy"); document.body.removeChild(t);
      toast("Copied!", "ok");
    }
  );
}

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function fmtDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" })
      + " " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
  } catch { return iso; }
}

function fmtLong(iso) {
  if (!iso) return null;
  try {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { weekday:"short", month:"long", day:"numeric", year:"numeric" })
      + " at " + d.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
  } catch { return iso; }
}

function ago(iso) {
  if (!iso) return "—";
  try {
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 1)  return "just now";
    if (m < 60) return m + "m ago";
    const h = Math.floor(m / 60);
    if (h < 24) return h + "h ago";
    return Math.floor(h / 24) + "d ago";
  } catch { return iso; }
}

function toast(msg, type = "inf") {
  const el = document.createElement("div");
  el.className = "toast toast-" + type;
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

/* ── Boot ────────────────────────────────────────────────────────────────── */
loadAll();
setInterval(loadAll, 30_000);   // auto-refresh every 30 s
</script>
