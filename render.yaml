services:
  - type: web
    name: mcp-browser
    runtime: node
    plan: standard
    buildCommand: npm install && npm run build
    startCommand: npm run start:browser
  - type: web
    name: oberlin-calendar-automation
    runtime: node
    plan: standard
    buildCommand: npm install
    startCommand: npm run start:automation
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: POLLER_ENABLED
        value: "true"
      - key: POLLER_INTERVAL_MS
        value: "60000"
      - key: AUTO_SEED_SOURCES
        value: "true"
      - key: MCP_BROWSER_URL
        value: https://mcp-browser.onrender.com/mcp
      - key: OPENAI_AGENT_MODEL
        value: gpt-4.1
      - key: OPENAI_DETAIL_MODEL
        value: gpt-4.1
      - key: OPENAI_DEDUPE_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_DEDUPE_ENABLED
        value: "true"
      - key: OPENAI_DEDUPE_MIN_CONFIDENCE
        value: "0.75"
      - key: OPENAI_DEDUPE_CONTEXT_LIMIT
        value: "50"
      - key: OPENAI_HYPERLOCAL_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_POSTER_MODEL
        value: gpt-4o
      - key: COMMUNITY_HUB_CALENDAR_URL
        value: https://environmentaldashboard.org/calendar/?show-menu-bar=1
      - key: COMMUNITY_HUB_SNAPSHOT_MODEL
        value: gpt-4.1-mini
      - key: COMMUNITY_HUB_SNAPSHOT_MAX_EVENTS
        value: "200"
      - key: HUB_SYNC_DAY_OF_WEEK
        value: "5"
      - key: HUB_SYNC_INTERVAL_MS
        value: "604800000"
      - key: REQUEST_TIMEOUT_MS
        value: "30000"
      - key: DETAIL_EXTRACTION_DELAY_MS
        value: "2000"
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: oberlin-calendar-automation-data
      mountPath: /var/data
      sizeGB: 1
